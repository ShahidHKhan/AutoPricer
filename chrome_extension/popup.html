<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AutoPricer</title>
  <style>
    body {
      width: 320px;
      font-family: -apple-system, Arial, sans-serif;
      padding: 12px;
    }
    h2 {
      font-size: 16px;
      margin: 0 0 4px 0;
    }
    .disclaimer {
      font-size: 11px;
      color: #777;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    button {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    #log {
      margin-top: 12px;
      max-height: 160px;
      overflow-y: auto;
      background: #f5f5f5;
      border-radius: 4px;
      padding: 8px;
      font-family: Consolas, monospace;
      font-size: 11px;
      line-height: 1.5;
      display: none;
    }
    #log:not(:empty) {
      display: block;
    }
    .log-entry {
      white-space: pre-wrap;
      word-break: break-word;
      color: #444;
    }
    #result {
      margin-top: 12px;
      font-size: 14px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .verdict {
      font-weight: bold;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .verdict.overpriced { color: #c0392b; }
    .verdict.underpriced { color: #27ae60; }
    .verdict.fair { color: #2980b9; }
    #error {
      color: #c0392b;
      margin-top: 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h2>AutoPricer</h2>
  <div class="disclaimer">
    Estimates are a directional signal, not a certified appraisal — accuracy
    varies. A check can take up to a minute; keep this window open while it runs.
  </div>
  <button id="checkBtn">Check This Listing</button>
  <div id="log"></div>
  <div id="result"></div>
  <div id="error"></div>
  <script src="popup.js"></script>
</body>
</html>
